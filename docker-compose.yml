services:
  backend:
    build:
      context: ./backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-in-coolify-to-a-long-random-secret}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/elprofessor.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      FLASK_DEBUG: "false"
      PORT: "5000"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@elprofessor.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_NAME: ${ADMIN_NAME:-عبدالرحمن}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    volumes:
      - dashboard_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  dashboard_data:
