services:
  # Single container: Flask API at /api/* + the cloud-design frontend served from
  # /app/dist (built by the ROOT Dockerfile). The old React app under ./frontend was
  # removed, so there is no separate frontend build — one served frontend, no drift.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-in-coolify-to-a-long-random-secret}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/elprofessor.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      FLASK_DEBUG: "false"
      PORT: "8080"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@elprofessor.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_NAME: ${ADMIN_NAME:-عبدالرحمن}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    volumes:
      - dashboard_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  dashboard_data:
