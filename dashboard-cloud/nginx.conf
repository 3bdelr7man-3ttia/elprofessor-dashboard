server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Arabic-first static SPA-style dashboard (design-first, built-in data)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for static assets, no-cache for the HTML entrypoints
    location ~* \.(js|css|png|jpg|jpeg|svg|gif|webp|ico|woff2?|ttf|otf|mp4)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location ~* \.html$ {
        add_header Cache-Control "no-store";
    }
}
