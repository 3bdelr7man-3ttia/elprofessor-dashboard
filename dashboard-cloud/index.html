<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الداش بورد الجديدة | البروفيسور</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Aref+Ruqaa:wght@700&display=swap');
:root{
  --navy:#1A2B4A; --navy-2:#0F172A; --navy-3:#22375C;
  --human:#9E2B4E; --human-2:#D6537A; --human-bg:#F9EEF2;
  --ai:#0E8E9B; --ai-bg:#E6F4F5; --agree:#1C9A5B; --agree-bg:#EAF6EF;
  --gold:#C8870E; --gold-bg:#FBF3E2; --conflict:#D9663B; --conflict-bg:#FBF0EB; --memory:#6E59C7; --memory-bg:#EFECF9;
  --ink:#1F2937; --ink-2:#4B5563; --muted:#8A93A6; --line:#E7EBF1;
  --bg:#F4F6F9; --surface:#FFFFFF; --surface-2:#F1F4F8; --rail:#16243f;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.7;overflow:hidden}
.app{display:flex;height:100vh;width:100%}
.robanner{background:var(--gold-bg);border-bottom:1px solid #EAD9A8;color:#9a6a08;font-size:12.5px;font-weight:800;padding:9px 24px;display:flex;align-items:center;gap:6px}
.robanner .ro-extra{color:var(--ink-2);font-weight:600}
.app.ro .acts{display:none!important}
.app.ro .urole{pointer-events:none;opacity:.45}
.icon{width:20px;height:20px;flex:none;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}

/* RAIL */
.rail{width:248px;flex:none;background:linear-gradient(180deg,var(--rail) 0%,var(--navy-2) 100%);color:#fff;display:flex;flex-direction:column}
.rail .brand{padding:20px 20px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.08)}
.rail .brand .mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--human) 0%,#7d2240 100%);display:grid;place-items:center;font-family:'Aref Ruqaa',serif;font-size:22px;font-weight:700;flex:none;box-shadow:0 4px 12px rgba(158,43,78,.35)}
.rail .brand .txt h1{font-family:'Aref Ruqaa',serif;font-size:20px;font-weight:700;line-height:1.3}
.rail .brand .txt span{font-size:10.5px;color:rgba(255,255,255,.55);font-weight:600;letter-spacing:.3px}
.rail .navwrap{flex:1;overflow-y:auto;padding:12px 12px 8px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.2) transparent}
.rail .navwrap::-webkit-scrollbar{width:5px}.rail .navwrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:3px}
.rail .grp{font-size:10px;font-weight:800;color:rgba(255,255,255,.4);letter-spacing:.6px;padding:10px 10px 6px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav .item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,.78);font-weight:600;font-size:13.2px;position:relative;transition:background .15s,color .15s}
.nav .item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav .item.on{background:rgba(255,255,255,.10);color:#fff}
.nav .item.on::before{content:"";position:absolute;right:-12px;top:50%;transform:translateY(-50%);width:4px;height:22px;border-radius:4px;background:var(--human-2)}
.nav .item .ic{opacity:.85}
.nav .item .count{margin-inline-start:auto;font-size:10.5px;font-weight:800;background:rgba(255,255,255,.14);border-radius:999px;padding:1px 8px;min-width:22px;text-align:center}
.nav .item.alert .count{background:var(--human);color:#fff}
.rail .me{padding:13px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.rail .me .av{width:34px;height:34px;border-radius:10px;background:var(--navy-3);display:grid;place-items:center;font-weight:800;font-size:14px;color:#fff;flex:none}
.rail .me .nm{font-size:12.5px;font-weight:700;line-height:1.3}
.rail .me .rl{font-size:10.5px;color:rgba(255,255,255,.5)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:62px;flex:none;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 24px}
.topbar .ttl h2{font-family:'Aref Ruqaa',serif;font-size:23px;font-weight:700;color:var(--navy);line-height:1.5;position:relative;display:inline-block;white-space:nowrap}
.topbar .ttl h2::after{content:"";position:absolute;bottom:2px;right:0;width:64px;height:4px;border-radius:3px;background:linear-gradient(90deg,var(--human) 0%,rgba(158,43,78,0) 100%)}
.topbar .search{margin-inline-start:auto;display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:7px 13px;width:240px;color:var(--muted)}
.topbar .search input{border:0;background:transparent;outline:0;font:inherit;font-size:13px;color:var(--ink);flex:1}
.topbar .tbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;color:var(--ink-2);cursor:pointer;position:relative}
.topbar .tbtn:hover{background:var(--surface-2)}
.topbar .tbtn .dot{position:absolute;top:8px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--human);border:2px solid var(--surface)}
.content{flex:1;overflow-y:auto;padding:20px 24px 40px}
.lead{font-size:13px;color:var(--ink-2);margin-bottom:16px;max-width:900px;line-height:1.75}
.lead b{color:var(--navy);font-weight:700}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
@media(max-width:1080px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px 17px;cursor:pointer;transition:box-shadow .15s,border-color .15s;position:relative;overflow:hidden}
.kpi:hover{box-shadow:0 6px 18px rgba(26,43,74,.07)}
.kpi.on{border-color:var(--navy)}
.kpi::before{content:"";position:absolute;top:0;right:0;width:4px;height:100%}
.kpi.k-1::before{background:var(--ai)} .kpi.k-2::before{background:var(--human)} .kpi.k-3::before{background:var(--agree)} .kpi.k-4::before{background:var(--conflict)}
.kpi .top{display:flex;align-items:center;gap:8px;color:var(--ink-2);font-size:12.5px;font-weight:700}
.kpi .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none}
.kpi.k-1 .ic{background:var(--ai-bg);color:var(--ai)} .kpi.k-2 .ic{background:var(--human-bg);color:var(--human)} .kpi.k-3 .ic{background:var(--agree-bg);color:var(--agree)} .kpi.k-4 .ic{background:var(--conflict-bg);color:var(--conflict)}
.kpi b{font-family:Cairo;font-size:26px;font-weight:900;display:block;margin-top:7px;line-height:1}
.kpi .sub{font-size:11px;color:var(--muted);font-weight:600;margin-top:3px}
.kpi.k-1 b{color:var(--ai)} .kpi.k-2 b{color:var(--human)} .kpi.k-3 b{color:var(--agree)} .kpi.k-4 b{color:var(--conflict)}

/* filter/tab bar */
.filterbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.filterbar .lbl{font-size:11.5px;font-weight:800;color:var(--muted);margin-inline-end:2px}
.chip{font-size:12px;font-weight:700;border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:5px 13px;cursor:pointer;color:var(--ink-2);display:inline-flex;align-items:center;gap:6px}
.chip:hover{background:var(--surface-2)}
.chip.on{background:var(--navy);border-color:var(--navy);color:#fff}
.chip .dotc{width:8px;height:8px;border-radius:50%}
.tabbar{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:16px;width:max-content;max-width:100%}
.tabbar .tab{font-size:12.5px;font-weight:700;border-radius:8px;padding:7px 15px;cursor:pointer;color:var(--ink-2);white-space:nowrap}
.tabbar .tab.on{background:var(--surface);color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.08);font-weight:800}

/* policy banner */
.policy{display:flex;gap:11px;background:var(--surface);border:1px solid var(--line);border-inline-start:4px solid var(--gold);border-radius:11px;padding:12px 15px;margin-bottom:16px;font-size:12.3px;color:var(--ink-2);line-height:1.6}
.policy .ic{width:20px;height:20px;color:var(--gold);flex:none;margin-top:1px}
.policy b{color:var(--navy);font-weight:700}

/* inbox / tables */
.inboxwrap{display:grid;grid-template-columns:1fr 332px;gap:16px;align-items:start}
@media(max-width:1180px){.inboxwrap{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.panel .ph{display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid var(--line);background:var(--surface-2)}
.panel .ph h3{font-family:Cairo;font-size:14.5px;font-weight:800;color:var(--navy)}
.panel .ph .n{font-size:11px;font-weight:800;background:var(--navy);color:#fff;border-radius:999px;padding:2px 9px}
.panel .ph .hint{margin-inline-start:auto;font-size:11.5px;color:var(--muted)}
.row{display:grid;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s;align-items:center}
.row:last-child{border-bottom:none}
.row:hover{background:var(--surface-2)}
.row.sel{background:var(--human-bg)}
.row .c{padding:13px 16px}
.row.inbox-row{grid-template-columns:1fr 200px 168px}
.row.esc-row{grid-template-columns:1.4fr 1fr 150px 150px}
.row .c1{display:flex;gap:12px;align-items:flex-start;min-width:0}
.row .src-ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:none;background:var(--surface-2);color:var(--ink-2)}
.row.sel .src-ic{background:#fff}
.row .out{font-weight:700;color:var(--ink);font-size:13.3px;line-height:1.4}
.row .from{font-size:11.5px;color:var(--muted);margin-top:1px}
.row .from b{color:var(--ink-2);font-weight:600}
.parties{font-size:12.5px;color:var(--ink);font-weight:600}
.parties .arr{color:var(--muted);margin:0 5px}
.parties .exp{color:var(--ai);font-weight:700}
.amt{font-family:Cairo;font-weight:900;font-size:15px;color:var(--navy)}
.amt small{font-weight:700;font-size:11px;color:var(--muted)}
.dest{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;border-radius:9px;padding:6px 11px;white-space:nowrap}
.dest .ic{width:16px;height:16px;stroke-width:2}
.destwrap{display:flex;align-items:center;gap:7px}
.destwrap .arrow{color:var(--muted);font-size:15px;flex:none}
.triage,.status{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;border-radius:999px;padding:4px 11px;white-space:nowrap}
.triage .d,.status .d{width:7px;height:7px;border-radius:50%}
.s-auto,.tri-auto{background:var(--agree-bg);color:var(--agree)} .s-auto .d,.tri-auto .d{background:var(--agree)}
.s-human,.tri-human{background:var(--human-bg);color:var(--human)} .s-human .d,.tri-human .d{background:var(--human)}
.s-wait,.tri-wait{background:var(--gold-bg);color:var(--gold)} .s-wait .d,.tri-wait .d{background:var(--gold)}
.s-late,.tri-late{background:var(--conflict-bg);color:var(--conflict)} .s-late .d,.tri-late .d{background:var(--conflict)}
.sla{font-size:11px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:5px}
.sla .ic{width:13px;height:13px;stroke-width:2}
.sla.warn{color:var(--conflict);font-weight:700}

/* drawer */
.drawer{background:var(--surface);border:1px solid var(--line);border-radius:14px;position:sticky;top:0;overflow:hidden}
.drawer .dh{background:var(--navy);color:#fff;padding:16px 18px}
.drawer .dh .k{font-size:11px;color:rgba(255,255,255,.6);font-weight:700;margin-bottom:3px}
.drawer .dh h3{font-family:Cairo;font-size:16px;font-weight:800;line-height:1.45}
.drawer .db{padding:16px 18px}
.drawer .route{display:flex;align-items:center;gap:9px;flex-wrap:wrap;background:var(--surface-2);border-radius:11px;padding:12px;margin-bottom:14px}
.drawer .route .step{font-size:12px;font-weight:700;color:var(--ink-2)}
.drawer .route .arrow{color:var(--human);font-weight:900}
.drawer .field{margin-bottom:12px}
.drawer .field .lab{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:4px}
.drawer .field .val{font-size:13px;color:var(--ink);font-weight:600}
.bigamt{font-family:Cairo;font-weight:900;font-size:26px;color:var(--navy);line-height:1}
.bigamt small{font-size:12px;color:var(--muted);font-weight:700}
.split{display:flex;gap:8px;margin-top:6px}
.split .s{flex:1;background:var(--surface-2);border-radius:9px;padding:8px 10px;text-align:center}
.split .s .l{font-size:10.5px;color:var(--muted);font-weight:700}
.split .s .v{font-family:Cairo;font-weight:800;font-size:15px;color:var(--ink);margin-top:2px}
.split .s.net .v{color:var(--agree)} .split .s.comm .v{color:var(--gold)}
.acts{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn{flex:1;border:0;border-radius:10px;padding:11px;font:inherit;font-weight:800;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;min-width:115px}
.btn .ic{width:17px;height:17px}
.btn-primary{background:var(--agree);color:#fff}.btn-primary:hover{filter:brightness(.94)}
.btn-human{background:var(--human);color:#fff}.btn-human:hover{background:#8a2444}
.btn-ghost{background:var(--surface-2);color:var(--ink);border:1px solid var(--line);flex:none;min-width:auto;padding:11px 14px}.btn-ghost:hover{background:var(--line)}
.btn-warn{background:var(--conflict-bg);color:var(--conflict);border:1px solid #E9C9BB}.btn-warn:hover{background:#f6e2d8}
.drawer .empty{padding:48px 22px;text-align:center;color:var(--muted)}
.drawer .empty .ic{width:40px;height:40px;margin:0 auto 12px;opacity:.5}
.note-ai{background:var(--ai-bg);border:1px solid #CDE8EA;border-radius:10px;padding:11px 13px;font-size:12px;color:#0a6d78;line-height:1.6;margin-bottom:14px;display:flex;gap:9px}
.note-ai .ic{width:18px;height:18px;flex:none;color:var(--ai);margin-top:1px}
/* dispute timeline */
.timeline{display:flex;align-items:center;margin:4px 0 14px}
.timeline .st{flex:1;text-align:center;position:relative;font-size:11px;font-weight:700;color:var(--muted)}
.timeline .st .dot{width:18px;height:18px;border-radius:50%;background:var(--surface-2);border:2px solid var(--line);margin:0 auto 5px;display:grid;place-items:center;color:#fff;font-size:10px}
.timeline .st.done .dot{background:var(--agree);border-color:var(--agree)} .timeline .st.done{color:var(--agree)}
.timeline .st.cur .dot{background:var(--gold);border-color:var(--gold)} .timeline .st.cur{color:var(--gold)}
.timeline .st::before{content:"";position:absolute;top:9px;right:-50%;width:100%;height:2px;background:var(--line);z-index:0}
.timeline .st:first-child::before{display:none}
.timeline .st.done::before{background:var(--agree)}
.placeholder{background:var(--surface);border:1px dashed var(--line);border-radius:14px;padding:54px 30px;text-align:center}
.placeholder .pic{width:60px;height:60px;border-radius:15px;display:grid;place-items:center;margin:0 auto 16px}
.placeholder h3{font-family:Cairo;font-size:19px;font-weight:800;color:var(--navy)}
.placeholder p{font-size:13.5px;color:var(--ink-2);max-width:440px;margin:7px auto 0;line-height:1.7}
.placeholder .soon{display:inline-block;margin-top:14px;font-size:11.5px;font-weight:800;background:var(--gold-bg);color:var(--gold);border-radius:999px;padding:5px 14px}
.scrim{position:fixed;inset:0;background:rgba(15,23,42,.52);display:grid;place-items:center;z-index:60;padding:20px}
.modal{background:var(--surface);border-radius:16px;max-width:470px;width:100%;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.34);animation:tin .2s ease}
.modal .mh{background:var(--navy);color:#fff;padding:15px 20px;font-family:Cairo;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:space-between}
.modal .mh button{background:rgba(255,255,255,.15);border:0;color:#fff;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:15px;line-height:1}
.modal .mb{padding:18px 20px;max-height:70vh;overflow-y:auto}
.modal .fld{margin-bottom:13px}
.modal .fld label{font-size:11.5px;font-weight:800;color:var(--muted);display:block;margin-bottom:5px}
.modal .fld input,.modal .fld textarea,.modal .fld select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 13px;font:inherit;font-size:13px;outline:0;background:var(--surface)}
.modal .fld textarea{resize:vertical;min-height:62px}
.modal .tg{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;cursor:pointer;background:var(--surface-2);border-radius:10px;padding:10px 13px}
.modal .tg input{width:auto}
.modal .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.tbtn .cbadge{position:absolute;top:4px;right:5px;min-width:16px;height:16px;border-radius:999px;background:var(--human);color:#fff;font-size:9.5px;font-weight:800;display:grid;place-items:center;border:2px solid var(--surface);padding:0 3px}
.toasts{position:fixed;bottom:20px;left:20px;display:flex;flex-direction:column;gap:8px;z-index:80}
.toast{background:var(--navy);color:#fff;border-radius:11px;padding:12px 16px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);display:flex;align-items:center;gap:9px;animation:tin .25s ease}
.toast .ic{width:18px;height:18px;color:#9be7c0}
@keyframes tin{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.badge-soon{font-size:9.5px;font-weight:800;background:var(--gold-bg);color:var(--gold);border-radius:5px;padding:1px 6px;margin-inline-start:6px;vertical-align:middle}
.topbar{position:relative}
.notifpanel{position:absolute;top:54px;left:16px;width:340px;max-height:60vh;overflow-y:auto;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 50px rgba(15,23,42,.22);z-index:70}
.np-h{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface)}
.np-h h4{font-family:Cairo;font-size:14px;font-weight:800;color:var(--navy)}
.np-h button{background:none;border:0;color:var(--ai);font:inherit;font-size:11.5px;font-weight:700;cursor:pointer}
.np-row{display:flex;gap:10px;padding:11px 15px;border-bottom:1px solid var(--line);align-items:flex-start}
.np-row:last-child{border-bottom:none}
.np-row.unread{background:var(--human-bg)}
.np-row .nd{width:7px;height:7px;border-radius:50%;background:var(--human);margin-top:6px;flex:none}
.np-row.read .nd{background:var(--line)}
.np-row .ntx{flex:1;font-size:12.5px;color:var(--ink);line-height:1.55}
.np-row .ntm{font-size:10.5px;color:var(--muted);margin-top:2px}
.np-empty{padding:36px 16px;text-align:center;color:var(--muted);font-size:12.5px}
.uedit{background:var(--human-bg);border-bottom:1px solid var(--line)}
.uedit-in{padding:14px 18px}
.uedit-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.uedit-h b{font-family:Cairo;color:var(--navy);font-size:14.5px}
.uedit-x{background:rgba(0,0,0,.06);border:0;width:26px;height:26px;border-radius:7px;cursor:pointer;color:var(--ink-2);font-size:13px}
.uedit-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:4px}
.uedit .lab{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:4px}
@media(max-width:760px){.row.inbox-row,.row.esc-row{grid-template-columns:1fr}.rail{position:fixed;inset:0 0 0 auto;z-index:60;transform:translateX(100%);transition:transform .25s;box-shadow:-8px 0 30px rgba(0,0,0,.3)}.rail.open{transform:translateX(0)}.menu-btn{display:grid}.topbar{padding:0 14px;gap:10px}.topbar .search{display:none}.content{padding:14px 14px 40px}.kpis{grid-template-columns:1fr 1fr}.inboxwrap{grid-template-columns:1fr}.tabbar{overflow-x:auto;max-width:100%}}
.menu-btn{display:none;width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--surface);place-items:center;color:var(--ink-2);cursor:pointer;flex:none}

const TRI={auto:{cls:'tri-auto',t:'عالجه الذكاء'},human:{cls:'tri-human',t:'محوّل لبشري'},wait:{cls:'tri-wait',t:'بانتظار'},late:{cls:'tri-late',t:'متأخّر — عاجل'}};

];

};

function itemHTML(id,m){
  const on=id===current?' on':'';const al=m.alert?' alert':'';
  const cnt=m.count?`<span class="count">${m.count}</span>`:'';
  const soon=m.soon?'<span class="badge-soon">قريبًا</span>':'';
  return `<div class="item${on}${al}" data-mod="${id}">${svg(m.ic)}<span>${m.label}</span>${soon}${cnt}</div>`;
}
function renderNav(){
  const groups={main:'nav-main',money:'nav-money',co:'nav-co'};
  Object.values(groups).forEach(id=>document.getElementById(id).innerHTML='');
  const labels=document.querySelectorAll('.rail .grp');
  if(role==='admin'){
    labels.forEach(g=>g.style.display='');
    Object.entries(groups).forEach(([g,elId])=>{
      const el=document.getElementById(elId);
      Object.entries(MODULES).filter(([id,m])=>m.grp===g).forEach(([id,m])=>el.insertAdjacentHTML('beforeend',itemHTML(id,m)));
    });
  } else {
    labels.forEach(g=>g.style.display='none');
    const el=document.getElementById('nav-main');
    ROLE_NAV[role].forEach(id=>{const m=MODULES[id];if(m)el.insertAdjacentHTML('beforeend',itemHTML(id,m));});
  }
  document.querySelectorAll('.nav .item').forEach(it=>it.onclick=()=>go(it.dataset.mod));
}
function go(mod){current=mod;selected=null;activeFilter='all';escTab='sessions';finTab='summary';usersFilter='all';courseTab='courses';invTab='investors';mktTab='campaigns';contentTab='pending';

  document.querySelectorAll('.nav .item').forEach(x=>x.classList.toggle('on',x.dataset.mod===mod));

}
function renderView(){
  const v=document.getElementById('view');

  if(MODULES[current]&&MODULES[current].soon)return viewSoon(v);
  if(current==='inbox')return viewInbox(v);
  if(current==='analysis')return viewAnalysis(v);
  if(current==='escrow')return viewEscrow(v);
  if(current==='finance')return viewFinance(v);
  if(current==='users')return viewUsers(v);
  if(current==='overview')return viewOverview(v);
  if(current==='courses')return viewCourses(v);
  if(current==='investment')return viewInvestment(v);
  if(current==='marketing')return viewMarketing(v);
  if(current==='packages')return viewPackages(v);
  if(current==='clubs')return viewClubs(v);
  if(current==='messages')return viewMessages(v);
  if(current==='content')return viewContent(v);
  if(current==='topics')return viewTopics(v);
  if(current==='news')return viewNews(v);
  if(current==='tutorials')return viewTutorials(v);
  if(current==='ai')return viewAI(v);

  if(current==='settings')return viewSettings(v);
  if(current==='market')return viewMarket(v);
  if(current==='t_home')return viewTHome(v);
  if(current==='t_courses')return viewTCourses(v);
  if(current==='t_earnings')return viewTEarnings(v);
  if(current==='i_home')return viewIHome(v);
  if(current==='i_market')return viewIMarket(v);
  if(current==='i_invest')return viewIInvest(v);
  if(current==='v_pending')return viewViewer(v);
  return viewPlaceholder(v);
}

/* ===== INBOX VIEW ===== */
function viewInbox(v){
  if(window.EP){EP.ensure('inbox',()=>viewInbox(v));}
  v.innerHTML=`
    <div class="kpis" id="kpis"></div>
    <div class="filterbar" id="filters"><span class="lbl">التوجيه:</span></div>
    <div class="inboxwrap">
      <section class="panel"><div class="ph"><h3>صندوق الوارد</h3><span class="n" id="inboxN">0</span><span class="hint">اضغط أي بند لرؤية التوجيه والإجراء</span></div><div id="rows"></div></section>
      <aside class="drawer" id="drawer"></aside>
    </div>`;
  // مؤشرات الوارد محسوبة من الصفوف الحقيقية فقط.
  const cAll=INBOX.length;
  const cHuman=INBOX.filter(i=>i.triage==='human').length;
  const cAuto=INBOX.filter(i=>i.triage==='auto').length;
  const cLate=INBOX.filter(i=>i.triage==='late'||i.slaWarn).length;
  const KP=[{cls:'k-1',ic:'inbox',t:'وارد جديد',v:cAll,f:'all'},{cls:'k-2',ic:'users',t:'بانتظار اعتماد بشري',v:cHuman,f:'human'},{cls:'k-3',ic:'check',t:'عالجها الذكاء آليًّا',v:cAuto,f:'auto'},{cls:'k-4',ic:'clock',t:'متأخّر عن المهلة',v:cLate,f:'late'}];
  const ke=document.getElementById('kpis');
  KP.forEach(k=>ke.insertAdjacentHTML('beforeend',`<div class="kpi ${k.cls}" data-f="${k.f}"><div class="top"><span class="ic">${svg(k.ic)}</span>${k.t}</div><b>${money(k.v)}</b></div>`));
  ke.querySelectorAll('.kpi').forEach(c=>c.onclick=()=>{activeFilter=c.dataset.f;renderInbox();});
  renderInbox();
  if(!cAll){const re=document.getElementById('rows');if(re)re.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">لا وارد جديد</div>';const nN=document.getElementById('inboxN');if(nN)nN.textContent='0';}
}
function renderInbox(){
  const fe=document.getElementById('filters');

function svgLine(data,color){
  var w=320,h=130,pad=12,n=data.length;var max=Math.max.apply(null,data.map(function(d){return d.v;}).concat([1]));
  function xs(i){return pad+(n>1?i*(w-2*pad)/(n-1):0);}function ys(v){return h-pad-(v/max)*(h-2*pad);}
  var pts=data.map(function(d,i){return xs(i).toFixed(1)+','+ys(d.v).toFixed(1);});
  var area='M'+pad+','+(h-pad)+' L'+pts.join(' L')+' L'+(w-pad)+','+(h-pad)+' Z';
  var dots=data.map(function(d,i){return '<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(d.v).toFixed(1)+'" r="3.5" fill="'+color+'"/>';}).join('');
  var labs=data.map(function(d,i){return '<text x="'+xs(i).toFixed(1)+'" y="'+(h+13)+'" font-size="10" fill="#8A93A6" text-anchor="middle">'+d.m+'</text>';}).join('');
  var vals=data.map(function(d,i){return '<text x="'+xs(i).toFixed(1)+'" y="'+(ys(d.v)-7).toFixed(1)+'" font-size="10" font-weight="700" fill="'+color+'" text-anchor="middle">'+d.v+'</text>';}).join('');
  return '<svg viewBox="0 0 '+w+' '+(h+18)+'" style="width:100%;height:auto"><path d="'+area+'" fill="'+color+'" fill-opacity="0.10"/><polyline points="'+pts.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+dots+vals+labs+'</svg>';
}
function svgDonut(segs){
  var total=segs.reduce(function(s,x){return s+x.val;},0)||1,R=70,r=52,c=2*Math.PI*r,off=0;
  var rings=segs.map(function(x){var len=x.val/total*c;var e='<circle cx="'+R+'" cy="'+R+'" r="'+r+'" fill="none" stroke="'+x.color+'" stroke-width="20" stroke-dasharray="'+len.toFixed(2)+' '+(c-len).toFixed(2)+'" stroke-dashoffset="'+(-off).toFixed(2)+'" transform="rotate(-90 '+R+' '+R+')"/>';off+=len;return e;}).join('');
  var legend=segs.map(function(x){return '<div style="display:flex;align-items:center;gap:7px;font-size:12px;margin-bottom:7px"><span style="width:11px;height:11px;border-radius:3px;background:'+x.color+'"></span><span style="flex:1;color:#4B5563">'+x.label+'</span><b style="color:#1A2B4A">'+Math.round(x.val/total*100)+'٪</b></div>';}).join('');
  return '<div style="display:flex;align-items:center;gap:16px"><svg viewBox="0 0 '+(2*R)+' '+(2*R)+'" style="width:128px;height:128px;flex:none">'+rings+'<circle cx="'+R+'" cy="'+R+'" r="'+(r-10)+'" fill="#FFFFFF"/></svg><div style="flex:1">'+legend+'</div></div>';
}
// رسم أعمدة عمودية نظيف يلائم الحاوية، يُظهر الأرقام (قيمة فوق كل عمود + اسم الشهر تحته)،
// ويتعامل بلطف مع الحالة شبه الفارغة (نقطة واحدة أو كل القيم صفر) برسالة «لا بيانات كافية».
// data: [{m:'05', v:12}, ...]  ·  unit: لاحقة القيمة (مثلاً 'ك' للألف) اختيارية
function svgBars(data,color,unit){
  data=(data||[]).filter(function(d){return d&&d.m!=null;});
  var nonZero=data.filter(function(d){return (d.v||0)>0;}).length;
  // حالة شبه فارغة: لا بيانات، أو نقطة واحدة فقط، أو كل القيم صفر.
  if(data.length<2||nonZero===0){
    return '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:150px;text-align:center;color:var(--muted)">'+
      svg('trend','ic')+
      '<div style="font-family:Cairo;font-weight:700;font-size:14px;color:var(--ink-2)">لا بيانات كافية لعرض النمو</div>'+
      '<div style="font-size:12px">تظهر الأعمدة تلقائيًا بمجرّد تسجيل إيرادات على مدى شهرين أو أكثر.</div>'+
      '</div>';
  }
  var max=Math.max.apply(null,data.map(function(d){return d.v||0;}).concat([1]));
  unit=unit||'';
  var bars=data.map(function(d){
    var v=d.v||0;
    var hpct=Math.max(v/max*100,v>0?4:0); // حد أدنى لارتفاع العمود حتى يبقى مرئيًا
    return '<div style="flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:6px">'+
      '<div style="font-size:11.5px;font-weight:800;color:var(--navy);white-space:nowrap">'+money(v)+unit+'</div>'+
      '<div style="width:100%;display:flex;justify-content:center"><div style="width:60%;max-width:34px;height:'+hpct+'%;min-height:'+(v>0?6:1)+'px;background:'+color+';border-radius:6px 6px 0 0"></div></div>'+
      '<div style="font-size:11.5px;font-weight:700;color:var(--ink-2);white-space:nowrap">'+d.m+'</div>'+
      '</div>';
  }).join('');
  return '<div style="display:flex;gap:10px;align-items:flex-end;height:170px;padding-top:8px">'+bars+'</div>';
}

function renderUsers(){

  fe.insertAdjacentHTML('beforeend',mk('all','الكل'));
  ROLES_LIST.forEach(r=>fe.insertAdjacentHTML('beforeend',mk(r,ROLE[r].t,ROLE[r].c)));

  });
}
function addUserModal(edit){
  var e=edit||{};
  var roleOpts=ROLES_LIST.map(function(rid){return '<option value="'+rid+'"'+(((e.role)||'member')===rid?' selected':'')+'>'+ROLE[rid].t+'</option>';}).join('');

    '<div class="row2"><div class="fld"><label>الدور</label><select id="u_r">'+roleOpts+'</select></div><div class="fld"><label>الباقة</label><input id="u_pl" value="'+(e.plan||'مجانية')+'"></div></div>'+
    '<label class="tg"><input type="checkbox" id="u_tr"'+(e.trainer==='approved'?' checked':'')+'> اعتماد كمدرّب</label>'+
    '<div class="acts" style="margin-top:14px"><button class="btn btn-primary" id="u_s">'+svg('check')+(edit?'حفظ':'أضف المستخدم')+'</button><button class="btn btn-ghost" id="u_x">إلغاء</button></div>');
  s.querySelector('#u_x').onclick=closeModal;
  s.querySelector('#u_s').onclick=function(){
    var nm=s.querySelector('#u_n').value.trim()||'مستخدم جديد';
    var data={name:nm,email:s.querySelector('#u_e').value.trim()||'user@mail.com',phone:s.querySelector('#u_p').value.trim()||'—',role:s.querySelector('#u_r').value,plan:s.querySelector('#u_pl').value.trim()||'مجانية',trainer:s.querySelector('#u_tr').checked?'approved':'none',verified:edit?e.verified:'pending',joined:edit?e.joined:'الآن'};
    var addLocal=function(){USERS.push(Object.assign({id:'u'+(USERS.length+1)},data));renderUsers();};
    if(edit){Object.assign(edit,data);closeModal();renderUsers();notify('حُدّثت بيانات '+nm);return;}
    // إضافة شخص جديد + إسناد دوره. عند اتصال الجسر الحيّ نكتب للـ API (POST /platform-users)؛
    // غير ذلك (بيانات تصميمية) نضيف محليًا. الدور دائمًا يُختار هنا من قائمة الأدوار.
    closeModal();
    if(window.EP&&EP.createUser&&EP.data.users){EP.createUser(data,addLocal,function(){});}
    else{addLocal();notify('أُضيف المستخدم '+nm);}
  };
}

// الإشعارات: أحداث حقيقية مُجمّعة من الخادم عبر EP.data.notifications (GET /api/notifications).
// كل عنصر: {id,title,detail,kind,route,time,read}. نُلحق محليًّا إشعارات الأفعال الفورية (notify)
// أعلى القائمة كي تظهر مباشرة دون انتظار جولة جلب جديدة.
var NOTIFS=[]; // إشعارات محلية مؤقتة (من أفعال المستخدم) — تُدمج فوق الحيّة
function notifAll(){var live=(window.EP&&EP.data&&EP.data.notifications)?EP.data.notifications:[];return NOTIFS.concat(live);}
function notifUnread(){return notifAll().filter(function(n){return !n.read;}).length;}
function notifBadge(){var b=document.getElementById('bellCount');if(!b)return;var u=notifUnread();b.textContent=u?u.toLocaleString('ar-EG'):'';b.style.display=u?'':'none';}
function renderNotifPanel(){
  var p=document.getElementById('notifPanel');if(!p)return;
  // ابدأ التحميل الحيّ مرة واحدة (idle) وأعد الرسم عند الجهوز.
  if(window.EP&&EP.ensure)EP.ensure('notifications',renderNotifPanel);
  var Nst=(window.EP&&EP.state&&EP.state.notifications)||'idle';
  var list=notifAll();
  var unread=notifUnread();
  var body;
  if(Nst==='loading'&&!list.length){
    body='<div class="np-empty">…جارٍ التحميل</div>';
  } else if(Nst==='error'&&!list.length){
    body='<div class="np-empty">تعذّر جلب الإشعارات. <b style="cursor:pointer;text-decoration:underline" id="npRetry">إعادة المحاولة</b></div>';
  } else if(!list.length){
    body='<div class="np-empty">لا إشعارات جديدة</div>';
  } else {
    body=list.map(function(n,i){var rt=n.route&&MODULES[n.route]?(' data-go="'+n.route+'"'):'';var cur=n.route&&MODULES[n.route]?';cursor:pointer':'';
      return '<div class="np-row '+(n.read?'read':'unread')+'"'+rt+' data-ni="'+i+'" style="'+cur+'"><span class="nd"></span><div><div class="ntx">'+(n.title||'إشعار')+'</div>'+(n.detail?'<div class="ntx" style="font-weight:400;color:var(--ink-2);font-size:11.5px">'+n.detail+'</div>':'')+'<div class="ntm">'+(n.time||'')+'</div></div></div>';
    }).join('');
  }
  p.innerHTML='<div class="np-h"><h4>الإشعارات'+(unread?' ('+unread.toLocaleString('ar-EG')+')':'')+'</h4><button id="npAll">تعليم الكل كمقروء</button></div>'+body;
  var allBtn=p.querySelector('#npAll');if(allBtn)allBtn.onclick=function(){NOTIFS.forEach(function(n){n.read=true;});if(window.EP&&EP.data&&EP.data.notifications)EP.data.notifications.forEach(function(n){n.read=true;});notifBadge();renderNotifPanel();};
  var rb=p.querySelector('#npRetry');if(rb)rb.onclick=function(){if(window.EP&&EP.reload)EP.reload('notifications',renderNotifPanel);};
  // نقر صف -> علّمه مقروءًا + انتقل لوحدته (route) إن وُجدت.
  p.querySelectorAll('.np-row[data-ni]').forEach(function(r){r.onclick=function(){var n=list[+r.dataset.ni];if(n)n.read=true;var go2=r.dataset.go;if(go2&&MODULES[go2]&&typeof go==='function'){p.style.display='none';go(go2);}notifBadge();renderNotifPanel();};});
  notifBadge();
}

  const el=document.getElementById('drawer');if(!el)return;

/* ===== «المواضيع» (Topics): بحث/مسودّة ← مراجعة مسودّة الذكاء ← نشر للوحة العامة. ===== */
// تُجلب حيّة من /api/platform-topics عبر طبقة EP (window.PTOPICS) — بما فيها المسودّات.
// الورك فلو: «موضوع جديد» يبحث ويُنشئ مسودّة بمسوّدة ذكاء (ai_answer) ← تُراجَع ← «نشر».
var PTOPICS=[];
function topEsc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function viewTopics(v){
  if(window.EP){EP.ensure('platformTopics',()=>viewTopics(v));}
  const Tst=(window.EP&&EP.state.platformTopics)||'idle';
  const pub=PTOPICS.filter(t=>t.status==='published').length,draft=PTOPICS.length-pub,withAI=PTOPICS.filter(t=>t.ai_answer).length;
  v.innerHTML=`
    <div class="policy" style="border-inline-start-color:var(--gold)">${svg('sparkles','ic')}<div><b>المواضيع:</b> ابحث موضوعًا (عنوان + سؤال + تخصص) فيُنشئ الذكاء <b>مسوّدة</b> ← راجعها ← اضغط <b>نشر</b> لتظهر على اللوحة العامة في المنصة.</div></div>
    <div class="policy" style="border-inline-start-color:var(--agree);background:var(--agree-bg)">${svg('check','ic')}<div><b>متصل بالمنصة:</b> الورك فلو = بحث/مسودّة ← مراجعة مسودّة الذكاء ← نشر. <b>${pub}</b> موضوعًا منشورًا الآن.</div></div>
    ${Tst==='error'?`<div class="policy" style="border-inline-start-color:var(--conflict);background:var(--conflict-bg);color:var(--conflict)">${svg('scale','ic')}<div>تعذّر جلب المواضيع من المنصة. <b style="cursor:pointer;text-decoration:underline" onclick="EP.reload('platformTopics',()=>viewTopics(document.getElementById('view')))">إعادة المحاولة</b></div></div>`:''}
    ${Tst==='loading'?`<div class="policy" style="border-inline-start-color:var(--gold)">${svg('sparkles','ic')}<div>…جارٍ تحميل المواضيع من المنصة</div></div>`:''}
    <div class="kpis">
      <div class="kpi k-3"><div class="top"><span class="ic">${svg('check')}</span>منشورة</div><b>${money(pub)}</b><div class="sub">على اللوحة العامة</div></div>
      <div class="kpi k-2"><div class="top"><span class="ic">${svg('doc')}</span>مسودّات</div><b>${money(draft)}</b><div class="sub">قيد المراجعة</div></div>
      <div class="kpi k-1"><div class="top"><span class="ic">${svg('sparkles')}</span>بمسوّدة ذكاء</div><b>${money(withAI)}</b><div class="sub">من ${money(PTOPICS.length)}</div></div>
    </div>
    <div class="inboxwrap"><section class="panel"><div class="ph"><h3>المواضيع</h3><span class="n">${PTOPICS.length}</span><button class="btn btn-human" id="topAdd" style="flex:none;min-width:auto;padding:6px 13px;font-size:12px;margin-inline-start:auto">+ موضوع جديد (بحث)</button></div><div id="topRows"></div></section></div>`;
  var ab=document.getElementById('topAdd');if(ab)ab.onclick=()=>topCreateModal();
  renderTopics();
}
function renderTopics(){
  const el=document.getElementById('topRows');if(!el)return;el.innerHTML='';
  const items=PTOPICS.slice();
  if(!items.length){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">لا مواضيع بعد — اضغط «+ موضوع جديد (بحث)» لبدء بحث ومسوّدة ذكاء.</div>';return;}
  items.forEach((t)=>el.insertAdjacentHTML('beforeend',`<div class="row esc-row" style="grid-template-columns:2fr 1fr 1fr 200px">
    <div class="c c1"><div class="src-ic" style="background:var(--gold-bg);color:var(--gold)">${svg('sparkles')}</div><div><div class="parties">${topEsc(t.title)}</div><div class="from">${topEsc(t.specialty)||'—'} · ${t.ai_answer?'<b style="color:var(--ink)">مسوّدة ذكاء ✓</b>':'بلا مسوّدة'}</div></div></div>
    <div class="c"><div class="from">${t.date||'—'}</div></div>
    <div class="c"><span class="status ${t.status==='published'?'s-auto':'s-wait'}"><span class="d"></span>${t.status==='published'?'منشور':'مسودّة'}</span></div>
    <div class="c" style="gap:6px">${t.status==='published'?'':`<button class="btn btn-primary" data-pub="${t.id}" style="padding:5px 11px;font-size:12px">نشر</button>`}<button class="btn btn-ghost" data-view="${t.id}" style="padding:5px 11px;font-size:12px">مراجعة</button><button class="btn btn-warn" data-del="${t.id}" style="padding:5px 11px;font-size:12px">حذف</button></div></div>`));
  el.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{var t=PTOPICS.find(x=>x.id===b.dataset.view);if(t)topReviewModal(t);});
  el.querySelectorAll('[data-pub]').forEach(b=>b.onclick=()=>{var t=PTOPICS.find(x=>x.id===b.dataset.pub);if(!t)return;
    if(!confirm('نشر «'+t.title+'» على اللوحة العامة؟'))return;
    if(window.EP){EP.publishTopic(t,()=>viewTopics(document.getElementById('view')));}});
  el.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{var t=PTOPICS.find(x=>x.id===b.dataset.del);if(!t)return;
    if(!confirm('حذف موضوع «'+t.title+'»؟'))return;
    if(window.EP){EP.deleteTopic(t,()=>viewTopics(document.getElementById('view')));}});
}
// الخطوة ١: بحث/مسودّة — عنوان + سؤال + تخصص ← الذكاء يُنشئ مسوّدة.

  var s=openModal('موضوع جديد — بحث ومسوّدة ذكاء',

    '<div class="fld"><label>العنوان</label><input id="tp_t" placeholder="مثال: حقوق العامل عند الفصل التعسّفي"></div>'+
    '<div class="fld"><label>السؤال (يبحثه الذكاء)</label><textarea id="tp_q" style="min-height:110px" placeholder="اكتب السؤال القانوني بوضوح ليبحثه الذكاء ويصيغ المسوّدة…"></textarea></div>'+

  s.querySelector('#tp_x').onclick=closeModal;
  s.querySelector('#tp_save').onclick=function(){
    var g={title:s.querySelector('#tp_t').value.trim(),question:s.querySelector('#tp_q').value.trim(),specialty:s.querySelector('#tp_sp').value.trim()};
    if(!g.title){toast('العنوان مطلوب');return;}

/* ===== «الأخبار» (News): أخبار قانونية منتقاة بصوتنا ← مراجعة ← نشر. ===== */
// تُجلب حيّة من /api/platform-news عبر طبقة EP (window.PNEWS) — مرتّبة بالأحدث،
// بما فيها المسودّات. الفريق يراجع الملخّص بصوتنا، يرى رابط (روابط) المصدر،
// ينشر/يحذف، أو «حوّل لموضوع». كما يحرّر مصادر الأخبار (RSS لكل دولة + كلمات الأندية).
var PNEWS=[];
var PNEWS_SOURCES={feeds:[],club_keywords:{}};
function nwsEsc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function nwsSrcChips(t){
  if(!t.sources||!t.sources.length)return '<span style="color:var(--muted)">بلا مصدر</span>';
  return t.sources.map(function(s){return '<a href="'+nwsEsc(s.url)+'" target="_blank" rel="noopener" style="color:var(--ai);text-decoration:underline;display:inline-block;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:bottom">'+nwsEsc(s.title||s.url)+'</a>';}).join(' · ');
}
function viewNews(v){

    <div class="policy" style="border-inline-start-color:var(--agree);background:var(--agree-bg)">${svg('check','ic')}<div><b>متصل بالمنصة:</b> الأخبار المنشورة تظهر مباشرة على المنصة مرتّبة بالأحدث. <b>${pub}</b> خبرًا منشورًا الآن.</div></div>
    ${Tst==='error'?`<div class="policy" style="border-inline-start-color:var(--conflict);background:var(--conflict-bg);color:var(--conflict)">${svg('scale','ic')}<div>تعذّر جلب الأخبار من المنصة. <b style="cursor:pointer;text-decoration:underline" onclick="EP.reload('platformNews',()=>viewNews(document.getElementById('view')))">إعادة المحاولة</b></div></div>`:''}
    ${Tst==='loading'?`<div class="policy" style="border-inline-start-color:var(--human)">${svg('mega','ic')}<div>…جارٍ تحميل الأخبار من المنصة</div></div>`:''}
    <div class="kpis">
      <div class="kpi k-3"><div class="top"><span class="ic">${svg('check')}</span>منشورة</div><b>${money(pub)}</b><div class="sub">ظاهرة للمستخدمين</div></div>
      <div class="kpi k-2"><div class="top"><span class="ic">${svg('doc')}</span>مسودّات</div><b>${money(draft)}</b><div class="sub">قيد المراجعة</div></div>
      <div class="kpi k-1"><div class="top"><span class="ic">${svg('mega')}</span>بمصدر موثّق</div><b>${money(withSrc)}</b><div class="sub">من ${money(PNEWS.length)}</div></div>

// إنشاء/تعديل خبر — عنوان + ملخّص بصوتنا + دولة + تخصص + روابط مصادر (سطر لكل رابط) + نشر.
function nwsModal(edit){
  var e=edit||{};
  var srcText=(e.sources||[]).map(function(s){return s.url+(s.title&&s.title!==s.url?' | '+s.title:'');}).join('\n');
  var s=openModal(edit?'تعديل خبر':'خبر جديد',
    '<div class="note-ai" style="margin-bottom:12px">'+svg('mega','ic')+'<div>اكتب الخبر بصوت البروفيسور، وأرفق <b>رابط المصدر</b> (سطر لكل مصدر — رابط ثم <code>|</code> ثم اسم اختياري). لن يُنشر حتى تفعّل «منشور».</div></div>'+
    '<div class="fld"><label>العنوان</label><input id="nw_t" value="'+nwsEsc(e.title||'')+'" placeholder="مثال: تعديل جديد على قانون العمل المصري"></div>'+
    '<div class="fld"><label>الملخّص (بصوتنا — يظهر للمستخدم)</label><textarea id="nw_sum" style="min-height:130px" placeholder="لخّص الخبر بصوت البروفيسور: ماذا تغيّر، ومن يهمّه، والأثر العملي…">'+nwsEsc(e.summary||'')+'</textarea></div>'+
    '<div class="row2"><div class="fld"><label>الدولة</label><input id="nw_cty" value="'+nwsEsc(e.country||'')+'" placeholder="مصر / السعودية / الإمارات…"></div><div class="fld"><label>التخصص</label><input id="nw_sp" value="'+nwsEsc(e.specialty||'')+'" placeholder="قانون عمل / عقاري / جنائي"></div></div>'+
    '<div class="fld"><label>روابط المصادر (سطر لكل مصدر: الرابط | الاسم)</label><textarea id="nw_src" style="min-height:80px;direction:ltr;text-align:left" placeholder="https://example.com/news | جريدة رسمية">'+nwsEsc(srcText)+'</textarea></div>'+
    '<div class="fld"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input id="nw_pub" type="checkbox"'+(e.status==='published'?' checked':'')+' style="width:auto"> منشور (ظاهر للمستخدمين على المنصة)</label></div>'+
    '<div class="acts" style="margin-top:6px"><button class="btn btn-primary" id="nw_save">'+svg('check')+(edit?'حفظ التعديلات':'إنشاء الخبر')+'</button><button class="btn btn-ghost" id="nw_x">إلغاء</button></div>');
  s.querySelector('#nw_x').onclick=closeModal;
  s.querySelector('#nw_save').onclick=function(){
    var sources=s.querySelector('#nw_src').value.split('\n').map(function(ln){
      ln=ln.trim();if(!ln)return null;var parts=ln.split('|');var url=(parts[0]||'').trim();var title=(parts[1]||'').trim();
      if(!url)return null;return {url:url,title:title||url};
    }).filter(Boolean);
    var g={
      title:s.querySelector('#nw_t').value.trim(),
      summary:s.querySelector('#nw_sum').value.trim(),
      country:s.querySelector('#nw_cty').value.trim(),
      specialty:s.querySelector('#nw_sp').value.trim(),
      sources:sources,
      is_published:s.querySelector('#nw_pub').checked,
    };
    if(!g.title){toast('العنوان مطلوب');return;}
    if(!window.EP){toast('غير متصل بالمنصة');return;}
    if(edit&&edit.id){EP.updateNews(edit.id,g,function(){closeModal();viewNews(document.getElementById('view'));});}
    else{EP.createNews(g,function(){closeModal();viewNews(document.getElementById('view'));});}
  };
}
// «مصادر الأخبار»: قائمة RSS لكل دولة + كلمات مفتاحية لكل نادٍ — مربوطة بـ /api/platform-news-sources.
function nwsSourcesModal(){
  var src=(window.EP&&EP.data&&EP.data.platformNewsSources)||PNEWS_SOURCES||{feeds:[],club_keywords:{}};
  var feedsText=(src.feeds||[]).map(function(f){return (f.country||'')+' | '+(f.url||'');}).join('\n');
  var ckObj=src.club_keywords||{};
  var ckText=Object.keys(ckObj).map(function(club){var kw=ckObj[club];return club+' : '+(Array.isArray(kw)?kw.join('، '):kw);}).join('\n');
  var s=openModal('مصادر الأخبار — RSS لكل دولة + كلمات الأندية',
    '<div class="note-ai" style="margin-bottom:12px">'+svg('gear','ic')+'<div>اضبط مصادر السحب (RSS) لكل دولة، وكلمات كل نادٍ التي تُصنّف الأخبار. تُحفظ على المنصة فورًا.</div></div>'+
    '<div class="fld"><label>مصادر RSS (سطر لكل مصدر: الدولة | رابط الـ RSS)</label><textarea id="ns_feeds" style="min-height:140px;direction:ltr;text-align:left" placeholder="مصر | https://example.com/feed.xml&#10;السعودية | https://news.example.sa/rss">'+nwsEsc(feedsText)+'</textarea></div>'+
    '<div class="fld"><label>كلمات الأندية (سطر لكل نادٍ: اسم النادي : كلمة، كلمة، كلمة)</label><textarea id="ns_ck" style="min-height:130px" placeholder="نادي العمل : فصل، أجور، تأمينات&#10;نادي العقاري : إيجار، تسجيل، ملكية">'+nwsEsc(ckText)+'</textarea></div>'+
    '<div class="acts" style="margin-top:6px"><button class="btn btn-primary" id="ns_save">'+svg('check')+'حفظ المصادر</button><button class="btn btn-ghost" id="ns_x">إلغاء</button></div>');
  s.querySelector('#ns_x').onclick=closeModal;
  s.querySelector('#ns_save').onclick=function(){
    var feeds=s.querySelector('#ns_feeds').value.split('\n').map(function(ln){
      ln=ln.trim();if(!ln)return null;var parts=ln.split('|');var country=(parts[0]||'').trim();var url=(parts[1]||'').trim();
      if(!url)return null;return {country:country,url:url};
    }).filter(Boolean);
    var club_keywords={};
    s.querySelector('#ns_ck').value.split('\n').forEach(function(ln){
      ln=ln.trim();if(!ln)return;var idx=ln.indexOf(':');if(idx<0)return;
      var club=ln.slice(0,idx).trim();var kw=ln.slice(idx+1).split(/[،,]/).map(function(k){return k.trim();}).filter(Boolean);
      if(club)club_keywords[club]=kw;
    });
    if(!window.EP){toast('غير متصل بالمنصة');return;}
    EP.saveNewsSources({feeds:feeds,club_keywords:club_keywords},function(){closeModal();viewNews(document.getElementById('view'));});
  };
}

var TUTORIALS=[];

function viewTutorials(v){
  if(window.EP){EP.ensure('tutorials',()=>viewTutorials(v));}
  const Tst=(window.EP&&EP.state.tutorials)||'idle';

    ${Tst==='loading'?`<div class="policy" style="border-inline-start-color:var(--ai)">${svg('book','ic')}<div>…جارٍ تحميل الدليل من المنصة</div></div>`:''}
    <div class="kpis">
      <div class="kpi k-3"><div class="top"><span class="ic">${svg('check')}</span>منشورة</div><b>${money(pub)}</b><div class="sub">ظاهرة للمستخدمين</div></div>

  var ab=document.getElementById('tutAdd');if(ab)ab.onclick=()=>tutModal(null);
  renderTutorials();
}
function renderTutorials(){
  const el=document.getElementById('tutRows');if(!el)return;el.innerHTML='';

    <div class="c"><div class="from">${t.video_url?'<b style="color:var(--ink)">فيديو ✓</b>':'نصّ فقط'}</div></div>
    <div class="c"><span class="status ${t.is_published?'s-auto':'s-wait'}"><span class="d"></span>${t.is_published?'منشور':'مسودّة'}</span></div>

  el.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{var t=TUTORIALS.find(x=>x.id===b.dataset.edit);if(t)tutModal(t);});

  });

/* ===== PARTNERS (Cap Table) ===== */
// جدول الحصص (cap table): لا أسماء/نِسَب/أرقام رأس مال تصميمية في المصدر — تُجلب حيّة أو يبقى فارغًا.
const PARTNERS=[];
function ptPartners(){return (window.EP&&EP.data.partners)?EP.data.partners.partners:PARTNERS;}
function viewPartners(v){
  if(window.EP){EP.ensure('partners',()=>viewPartners(v));}
  const Pst=(window.EP&&EP.state.partners)||'idle';
  const PRT=ptPartners();
  const totalInv=PRT.reduce((s,p)=>s+(p.invested||0),0);
  const reservePartner=PRT.find(p=>p.name==='غير موزّع');
  const reserveEq=reservePartner?reservePartner.equity:0;
  const realPartners=PRT.filter(p=>p.name!=='غير موزّع');
  const maxEq=realPartners.length?Math.max(...realPartners.map(p=>p.equity)):0;
  const bar=PRT.map(p=>`<div title="${p.name} ${p.equity}٪" style="width:${p.equity}%;background:${p.c}"></div>`).join('');
  const rows=PRT.map((p,i)=>`<div class="prow" data-p="${i}" style="display:flex;align-items:center;gap:12px;padding:11px 8px;border-bottom:1px solid var(--line);cursor:pointer;border-radius:8px">
    <span style="width:12px;height:12px;border-radius:3px;background:${p.c};flex:none"></span>
    <div style="flex:1"><div style="font-weight:700;font-size:13.5px">${p.name}</div><div style="font-size:11.5px;color:var(--muted)">${p.role}</div></div>
    <div style="font-family:Cairo;font-weight:900;font-size:16px;color:var(--navy)">${p.equity}٪</div>
    <div style="width:110px;text-align:left;font-size:12px;color:var(--ink-2)">${p.invested?money(p.invested)+' ج':'—'}</div></div>`).join('');
  v.innerHTML=`
    ${Pst==='error'?`<div class="policy" style="border-inline-start-color:var(--conflict);background:var(--conflict-bg);color:var(--conflict)">${svg('scale','ic')}<div>تعذّر جلب الشركاء من الخادم — تُعرض بيانات تصميمية. <b style="cursor:pointer;text-decoration:underline" onclick="EP.reload('partners',()=>viewPartners(document.getElementById('view')))">إعادة المحاولة</b></div></div>`:''}
    ${Pst==='loading'?`<div class="policy">${svg('hands','ic')}<div>…جارٍ تحميل الشركاء من الخادم</div></div>`:''}
    <div class="kpis">
      <div class="kpi k-1"><div class="top"><span class="ic">${svg('hands')}</span>الشركاء</div><b>${money(realPartners.length)}</b><div class="sub">+ احتياطي</div></div>
      <div class="kpi k-3"><div class="top"><span class="ic">${svg('wallet')}</span>إجمالي الاستثمار</div><b>${money(totalInv)} <small style="font-size:13px">ج</small></b><div class="sub">رأس المال</div></div>
      <div class="kpi k-2"><div class="top"><span class="ic">${svg('trend')}</span>أكبر حصة</div><b>${maxEq}٪</b><div class="sub">المؤسس الرئيس</div></div>
      <div class="kpi k-4"><div class="top"><span class="ic">${svg('brief')}</span>غير موزّع</div><b>${reserveEq}٪</b><div class="sub">احتياطي</div></div>
    </div>
    <section class="panel"><div class="ph"><h3>توزيع الحصص</h3><button class="btn btn-human" id="pAdd" style="flex:none;min-width:auto;padding:6px 13px;font-size:12px;margin-inline-start:auto">+ إضافة شريك</button></div><div style="padding:20px">
      ${PRT.length?`<div style="display:flex;height:28px;border-radius:8px;overflow:hidden;box-shadow:inset 0 0 0 1px var(--line)">${bar}</div>
      <div style="margin-top:10px">${rows}</div>`:'<div style="padding:30px;text-align:center;color:var(--muted)">لا شركاء مسجّلون بعد.</div>'}
    </div></section>`;
  document.getElementById('pAdd').onclick=function(){partnerModal(null);};
  v.querySelectorAll('.prow').forEach(r=>{r.onmouseenter=()=>r.style.background='var(--surface-2)';r.onmouseleave=()=>r.style.background='';r.onclick=()=>partnerModal(+r.dataset.p);});
}
function partnerModal(idx){
  var live=!!(window.EP&&EP.data.partners);
  var edit=(idx!=null&&idx>=0)?ptPartners()[idx]:null,e=edit||{};
  var colors=['var(--human)','var(--ai)','var(--gold)','var(--memory)','var(--agree)','var(--navy)'];
  var canDel=edit&&e.name!=='غير موزّع';
  var nameFld = edit
    ? '<div class="fld"><label>الاسم</label><input id="p_n" value="'+(e.name||'')+'"></div>'
    : '<div class="note-ai" style="margin-bottom:12px">'+svg('sparkles','ic')+'<div>التسجيل من المنصة فقط. اختر مستخدمًا <b>مسجّلًا</b> لإضافته كشريك.</div></div>'+
      '<div class="fld"><label>اختر من المستخدمين المسجّلين</label><select id="p_n"><option value="">— اختر مستخدمًا —</option>'+USERS.map(function(u){return '<option value="'+u.name+'">'+u.name+' · '+u.email+'</option>';}).join('')+'</select></div>';
  var s=openModal(edit?'تعديل شريك':'إضافة شريك من المسجّلين',
    nameFld+
    '<div class="fld"><label>الصفة</label><input id="p_r" value="'+(e.role||'شريك')+'"></div>'+
    '<div class="row2"><div class="fld"><label>الحصة (٪)</label><input id="p_eq" type="number" step="0.1" value="'+(e.equity||'')+'"></div><div class="fld"><label>الاستثمار (ج)</label><input id="p_inv" type="number" value="'+(e.invested||'')+'"></div></div>'+
    '<div class="acts" style="margin-top:14px"><button class="btn btn-primary" id="p_s">'+svg('check')+(edit?'حفظ':'أضف الشريك')+'</button>'+(canDel?'<button class="btn btn-warn" id="p_d">حذف</button>':'')+'<button class="btn btn-ghost" id="p_x">إلغاء</button></div>');
  s.querySelector('#p_x').onclick=closeModal;
  s.querySelector('#p_s').onclick=function(){
    var nm=s.querySelector('#p_n').value.trim();
    if(!edit&&!nm){toast('اختر مستخدمًا مسجّلًا أولًا');return;}
    var data={name:nm||'شريك',role:s.querySelector('#p_r').value.trim()||'شريك',equity:+s.querySelector('#p_eq').value||0,invested:+s.querySelector('#p_inv').value||0,c:e.c||colors[ptPartners().length%colors.length]};
    if(live){
      var body={name:data.name,role:data.role,equity_percent:data.equity,capital_egp:data.invested};
      if(edit&&edit.pid){EP.updatePartner(edit.pid,body,function(){closeModal();viewPartners(document.getElementById('view'));});}
      else{EP.createPartner(body,function(){closeModal();viewPartners(document.getElementById('view'));});}
      return;
    }
    if(edit){Object.assign(edit,data);}else{PARTNERS.push(data);var u=USERS.find(function(x){return x.name===nm;});if(u)u.role='staff';}
    closeModal();viewPartners(document.getElementById('view'));notify(edit?'حُدّث الشريك':'أُضيف الشريك «'+data.name+'»');
  };
  var pd=s.querySelector('#p_d');if(pd)pd.onclick=function(){
    if(live&&edit&&edit.pid){EP.deletePartner(edit.pid,function(){closeModal();viewPartners(document.getElementById('view'));});return;}
    PARTNERS.splice(idx,1);closeModal();viewPartners(document.getElementById('view'));notify('حُذف الشريك «'+e.name+'»');};
}

  v.innerHTML=`
    ${Tst==='error'&&!live?`<div class="policy" style="border-inline-start-color:var(--conflict);background:var(--conflict-bg);color:var(--conflict)">${svg('scale','ic')}<div>تعذّر جلب الفريق من المنصة — تُعرض بيانات تصميمية. <b style="cursor:pointer;text-decoration:underline" onclick="EP.reload('team',()=>viewTeam(document.getElementById('view')))">إعادة المحاولة</b></div></div>`:''}
    <div class="kpis">

      <div class="kpi k-2"><div class="top"><span class="ic">${svg('cap')}</span>مدرّبون معتمدون</div><b>${Tst==='loading'&&!live?'…':money(trainers.length)}</b><div class="sub">عبر التدريب</div></div>
      <div class="kpi k-3"><div class="top"><span class="ic">${svg('robot')}</span>نموذج التشغيل</div><b>أتمتة + فريق صغير</b><div class="sub">الذكاء ينجز ويصعّد</div></div>

/* ===== FOUNDATION ===== */
var foundationTab='assets';
// التأسيس: لا أصول/أدوات/رأس مال/حالة قانونية تصميمية — تُجلب حيّة من الـ API أو تبقى فارغة.
const FND_CAPITAL=[];
const FND_TOOLS=[];
const FND_ASSETS=[];
const FND_STATUS=[];
function fndAssetsArr(){return (window.EP&&EP.data.foundation)?EP.data.foundation.assets:FND_ASSETS;}
function fndToolsArr(){return (window.EP&&EP.data.foundation)?EP.data.foundation.tools:FND_TOOLS;}
function fndCapitalArr(){return (window.EP&&EP.data.foundation)?EP.data.foundation.capital:FND_CAPITAL;}
function fndStatusArr(){return FND_STATUS;} // حالة الكيان القانوني: لا مصدر حقيقي — فارغة
function viewFoundation(v){
  if(window.EP){EP.ensure('foundation',()=>viewFoundation(v));}
  var Fst=(window.EP&&EP.state.foundation)||'idle';
  var live=!!(window.EP&&EP.data.foundation);
  var K=live?EP.data.foundation.kpi:null;
  var A=fndAssetsArr(),T=fndToolsArr(),C=fndCapitalArr(),S=fndStatusArr();
  // رأس المال: من الخادم (ضخّ رأس المال أو إجمالي رؤوس أموال الشركاء) وإلا مجموع البنود التصميمية.
  var capServer=K&&(K.capital||0)>0?K.capital:0;
  var capPartners=C.reduce((s,x)=>s+(x.amount||0),0);
  var cap=capServer||capPartners||0;
  var monthly=K&&(K.monthly||0)>0?K.monthly:T.reduce((s,x)=>s+(x.cost||0),0);
  var monthlyCcy=(K&&(K.monthly||0)>0)?' ج':''; // إيجار الأصول الشهري يُحتسب بالجنيه؛ الأدوات التصميمية بالدولار
  var assetsVal=K&&(K.assetsVal||0)>0?K.assetsVal:A.reduce((s,x)=>s+(x.value||0)*(x.qty||1),0);
  var assetsCcy=(K&&(K.assetsVal||0)>0)?' ج':'';
  var founders=(window.EP&&EP.data.foundation&&typeof tmFounders==='function')?tmFounders():0;
  v.innerHTML=`
    ${Fst==='error'&&!live?`<div class="policy" style="border-inline-start-color:var(--conflict);background:var(--conflict-bg);color:var(--conflict)">${svg('scale','ic')}<div>تعذّر جلب بيانات التأسيس من الخادم — تُعرض بيانات تصميمية. <b style="cursor:pointer;text-decoration:underline" onclick="EP.reload('foundation',()=>viewFoundation(document.getElementById('view')))">إعادة المحاولة</b></div></div>`:''}
    <div class="kpis">
      <div class="kpi k-3"><div class="top"><span class="ic">${svg('wallet')}</span>رأس المال</div><b>${Fst==='loading'&&!live?'…':money(cap)} <small style="font-size:13px">ج</small></b><div class="sub">${live?'حيّ — ضخّ رأس المال':'مستثمَر + تشغيلي'}</div></div>
      <div class="kpi k-4"><div class="top"><span class="ic">${svg('trend')}</span>مصروف شهري ثابت</div><b>${monthlyCcy?money(monthly):'$'+money(monthly)}${monthlyCcy?'<small style="font-size:13px">'+monthlyCcy+'</small>':''}</b><div class="sub">${live?'إيجار/اشتراكات شهرية':T.length+' اشتراكات'}</div></div>
      <div class="kpi k-1"><div class="top"><span class="ic">${svg('build')}</span>قيمة الأصول</div><b>${assetsCcy?money(assetsVal):'$'+money(assetsVal)}${assetsCcy?'<small style="font-size:13px">'+assetsCcy+'</small>':''}</b><div class="sub">${A.length} بنود معدات</div></div>
      <div class="kpi k-2"><div class="top"><span class="ic">${svg('hands')}</span>المؤسسون</div><b>${money(founders)}</b><div class="sub">شركاء</div></div>
    </div>
    <div class="tabbar" id="fTabs">
      <div class="tab${foundationTab==='assets'?' on':''}" data-t="assets">الأصول والمعدات (${A.length})</div>
      <div class="tab${foundationTab==='tools'?' on':''}" data-t="tools">الأدوات والاشتراكات (${T.length})</div>
      <div class="tab${foundationTab==='capital'?' on':''}" data-t="capital">رأس المال (${C.length})</div>
      <div class="tab${foundationTab==='status'?' on':''}" data-t="status">حالة الكيان (${S.length})</div>
    </div>
    <section class="panel"><div class="ph"><h3 id="fH"></h3><span class="n" id="fN"></span>${live?'<span class="hint" id="fLiveHint" style="margin-inline-start:auto"></span>':'<button class="btn btn-human" id="fAdd" style="flex:none;min-width:auto;padding:6px 13px;font-size:12px;margin-inline-start:auto">+ <span id="fAddLbl">معدة</span></button>'}</div><div id="fRows"></div></section>`;
  v.querySelectorAll('#fTabs .tab').forEach(t=>t.onclick=()=>{foundationTab=t.dataset.t;viewFoundation(v);});

/* ===== TARGETS ===== */
const TARGETS=[{m:'يوليو',actual:30,target:35},{m:'أغسطس',actual:0,target:42},{m:'سبتمبر',actual:0,target:50},{m:'أكتوبر',actual:0,target:60}];
// لا أهداف تصميمية — الأهداف تُشتق حيًّا من /api/dashboard (انظر loader targets)
// أو تبقى فارغة (إضافة يدويّة)، ويرشد مستشار الـ AI بأهداف مقترحة من الأداء الحقيقي.
const GOALS=[];
const GSTAT={on:{t:'على المسار',cls:'s-auto'},behind:{t:'متأخّر',cls:'s-late'},done:{t:'مكتمل',cls:'s-human'}};
// مصادر الأهداف الحيّة (مع سقوط آمن للبيانات التصميمية لو الخادم غير متاح أو لا توقّعات).
function tgBars(){return (window.EP&&EP.data.targets&&EP.data.targets.bars.length)?EP.data.targets.bars:TARGETS;}
function tgGoals(){return (window.EP&&EP.data.targets&&EP.data.targets.goals.length)?EP.data.targets.goals:GOALS;}
function viewTargets(v){
  if(window.EP){EP.ensure('targets',()=>viewTargets(v));}
  const Tst=(window.EP&&EP.state.targets)||'idle';
  const liveBars=!!(window.EP&&EP.data.targets&&EP.data.targets.bars.length);
  const liveGoals=!!(window.EP&&EP.data.targets&&EP.data.targets.goals.length);
  const live=liveBars||liveGoals;
  const BARS=tgBars(), GLS=tgGoals();
  const mx=Math.max(...BARS.map(t=>t.target),1);
  const sumT=BARS.reduce((s,t)=>s+t.target,0),sumA=BARS.reduce((s,t)=>s+t.actual,0);
  const onTrack=GLS.filter(g=>g.status==='on').length,behind=GLS.filter(g=>g.status==='behind').length,done=GLS.filter(g=>g.status==='done').length;
  // النسبة المحقّقة ماليًّا: من الخادم إن وُجدت، وإلا تُحتسب من البارات.
  const qPct=(window.EP&&EP.data.targets&&EP.data.targets.quarterPct!=null)?EP.data.targets.quarterPct:(sumT?Math.round(sumA/sumT*100):0);
  const bars=BARS.map((t,i)=>`<div class="tgbar" ${liveBars?'':`data-i="${i}"`} style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px${liveBars?'':';cursor:pointer'}" ${liveBars?'':'title="اضغط للتعديل"'}><div style="display:flex;gap:5px;align-items:flex-end;height:130px"><div style="width:18px;background:var(--agree);border-radius:5px 5px 0 0;height:${(t.actual||0)/mx*130}px" title="فعلي ${money(t.actual||0)}${liveBars?' ألف':''}"></div><div style="width:18px;background:var(--gold);border-radius:5px 5px 0 0;height:${(t.target||0)/mx*130}px" title="هدف ${money(t.target||0)}${liveBars?' ألف':''}"></div></div><div style="font-size:12px;font-weight:700;color:var(--ink-2)">${t.m}</div></div>`).join('');
  v.innerHTML=`
    ${Tst==='error'&&!live?`<div class="policy" style="border-inline-start-color:var(--conflict);background:var(--conflict-bg);color:var(--conflict)">${svg('scale','ic')}<div>تعذّر جلب الأهداف والتوقّعات من الخادم — تُعرض بيانات تصميمية. <b style="cursor:pointer;text-decoration:underline" onclick="EP.reload('targets',()=>viewTargets(document.getElementById('view')))">إعادة المحاولة</b></div></div>`:''}
    <div class="kpis">
      <div class="kpi k-3"><div class="top"><span class="ic">${svg('trend')}</span>أهداف نشطة</div><b>${Tst==='loading'&&!live?'…':money(GLS.length-done)}</b><div class="sub">${done} مكتمل</div></div>
      <div class="kpi k-1"><div class="top"><span class="ic">${svg('check')}</span>على المسار</div><b>${money(onTrack)}</b><div class="sub">تسير حسب الخطة</div></div>
      <div class="kpi k-4"><div class="top"><span class="ic">${svg('clock')}</span>متأخّرة</div><b>${money(behind)}</b><div class="sub">تحتاج تدخّلًا</div></div>
      <div class="kpi k-2"><div class="top"><span class="ic">${svg('wallet')}</span>المحقّق ماليًّا</div><b>${qPct}٪</b><div class="sub">${liveBars?'فعلي ÷ هدف التوقّعات':'من هدف الربع'}</div></div>
    </div>
    <section class="panel" style="margin-bottom:16px"><div class="ph"><h3>مستشار الأهداف الذكي</h3><span class="hint" style="margin-inline-start:auto">مبنيّ على أداء المنصة الحقيقي</span></div><div id="goalsAdvisor" style="padding:16px 18px"></div></section>
    <section class="panel" style="margin-bottom:16px"><div class="ph"><h3>أهداف الشركة ومتابعتها</h3><span class="n">${GLS.length}</span>${liveGoals?'<span class="hint" style="margin-inline-start:auto">مشتقّة من الأرقام الحيّة</span>':'<button class="btn btn-human" id="goalAdd" style="flex:none;min-width:auto;padding:6px 13px;font-size:12px;margin-inline-start:auto">+ هدف</button>'}</div><div id="goalRows"></div></section>
    <section class="panel"><div class="ph"><h3>التوقّعات المالية الشهرية</h3>${liveBars?'<span class="hint" style="margin-inline-start:auto">حيّ — هدف ÷ فعلي (بالألف ج)</span>':'<button class="btn btn-ghost" id="tgAdd" style="flex:none;min-width:auto;padding:6px 13px;font-size:12px;margin-inline-start:auto">+ شهر</button>'}</div>
      ${BARS.length?`<div style="display:flex;gap:18px;align-items:flex-end;padding:22px 24px 10px">${bars}</div>
      <div style="display:flex;gap:16px;padding:0 24px 18px;font-size:12px;color:var(--ink-2)"><span style="display:flex;align-items:center;gap:6px"><span style="width:11px;height:11px;border-radius:3px;background:var(--agree)"></span>فعلي</span><span style="display:flex;align-items:center;gap:6px"><span style="width:11px;height:11px;border-radius:3px;background:var(--gold)"></span>هدف</span></div>`:'<div class="empty" style="padding:34px;text-align:center;color:var(--muted)">'+svg('trend','ic')+'<p>لا توقّعات مالية مسجّلة بعد</p></div>'}</section>`;
  if(!liveBars){var tga=document.getElementById('tgAdd');if(tga)tga.onclick=function(){targetModal(null);};v.querySelectorAll('.tgbar').forEach(r=>r.onclick=()=>targetModal(+r.dataset.i));}
  if(!liveGoals){var ga=document.getElementById('goalAdd');if(ga)ga.onclick=function(){goalModal(null);};}
  renderGoals(liveGoals);
  renderGoalsAdvisor();
}
// مستشار الأهداف بالـ AI: يحمّل GET /api/ai/goals-advisor (عبر EP loader) ويعرض
// العنوان + رؤى + أهداف مقترحة. حالات تحميل/خطأ/فراغ مدعومة.
function renderGoalsAdvisor(){
  var el=document.getElementById('goalsAdvisor');if(!el)return;
  if(window.EP&&EP.ensure)EP.ensure('goalsAdvisor',renderGoalsAdvisor);
  var Ast=(window.EP&&EP.state&&EP.state.goalsAdvisor)||'idle';
  var A=(window.EP&&EP.data&&EP.data.goalsAdvisor)||null;
  if(!window.EP){el.innerHTML='<div class="empty" style="text-align:center;color:var(--muted)">'+svg('sparkles','ic')+'<p>المستشار الذكي متاح بعد الاتصال بالخادم.</p></div>';return;}
  if(Ast==='loading'&&!A){el.innerHTML='<div class="note-ai">'+svg('sparkles','ic')+'<div>…يحلّل المستشار أداء المنصة ليقترح أهدافًا.</div></div>';return;}
  if(Ast==='error'&&!A){el.innerHTML='<div class="note-ai" style="background:var(--conflict-bg);border-color:#E9C9BB;color:var(--conflict)">'+svg('scale','ic')+'<div>تعذّر جلب توصيات المستشار. <b style="cursor:pointer;text-decoration:underline" onclick="EP.reload(\'goalsAdvisor\',renderGoalsAdvisor)">إعادة المحاولة</b></div></div>';return;}
  if(!A||(!A.headline&&!(A.insights||[]).length&&!(A.suggested||[]).length)){el.innerHTML='<div class="empty" style="text-align:center;color:var(--muted)">'+svg('sparkles','ic')+'<p>لا توصيات بعد — تتكوّن مع تراكم أداء المنصة.</p></div>';return;}
  var html='';
  if(A.headline)html+='<div class="note-ai">'+svg('sparkles','ic')+'<div><b>'+A.headline+'</b></div></div>';
  if((A.insights||[]).length){
    html+='<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:'+((A.suggested||[]).length?'14px':'0')+'">';
    A.insights.forEach(function(ins){var t=(typeof ins==='string')?ins:(ins&&(ins.text||ins.title||ins.detail)||'');if(!t)return;
      html+='<div style="display:flex;gap:9px;align-items:flex-start;font-size:12.5px;color:var(--ink-2);line-height:1.6"><span style="color:var(--ai);flex:none;margin-top:2px;width:16px;height:16px">'+svg('trend')+'</span><div>'+t+'</div></div>';});
    html+='</div>';
  }
  if((A.suggested||[]).length){
    html+='<div style="font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:8px">أهداف مقترحة</div>';
    A.suggested.forEach(function(g,i){
      var title=(typeof g==='string')?g:(g&&(g.title||g.text)||'هدف مقترح');
      var meta=[];
      if(g&&g.target!=null)meta.push('المستهدف '+money(+g.target||0)+(g.unit?' '+g.unit:''));
      if(g&&g.due)meta.push('الموعد '+g.due);
      if(g&&g.rationale)meta.push(g.rationale);
      var canAdd=(typeof g==='object'&&g);
      html+='<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;margin-bottom:8px;background:var(--surface-2)">'+
        '<span class="dest" style="background:var(--gold-bg);color:#9a6a08;font-size:10.5px">'+((g&&g.cat)||'مقترح')+'</span>'+
        '<div style="flex:1"><div style="font-weight:700;font-size:13px;color:var(--ink)">'+title+'</div>'+(meta.length?'<div style="font-size:11px;color:var(--muted);margin-top:3px">'+meta.join(' · ')+'</div>':'')+'</div>'+
        (canAdd?'<button class="btn btn-human gadv-add" data-i="'+i+'" style="flex:none;min-width:auto;padding:5px 11px;font-size:11.5px">+ تبنّي</button>':'')+'</div>';
    });
  }
  el.innerHTML=html;

function drawClub(){
  var el=document.getElementById('drawer');if(!el)return;
  if(selected===null){el.innerHTML='<div class="empty">'+svg('cap','ic')+'<p>اختر اقتراحًا أو طلبًا أو ناديًا للإجراء.</p></div>';return;}
  var t=selected[0],i=+selected.slice(1);
  if(t==='p'){var p=CLUB_PROPOSALS[i];el.innerHTML='<div class="dh"><div class="k">اقتراح نادٍ · من المنصة</div><h3>'+p.name+'</h3></div><div class="db"><div class="route"><span class="step">المنصة · عضو/خبير</span><span class="arrow">←</span><span class="step" style="color:var(--ai);font-weight:800">النوادي</span></div><div class="field"><div class="lab">المقترِح</div><div class="val">'+p.by+'</div></div><div class="field"><div class="lab">الوصف</div><div class="val">'+p.note+'</div></div><div class="field"><div class="lab">المهتمون</div><div class="val">'+p.members+'</div></div><div class="acts"><button class="btn btn-primary" data-a="approve">'+svg('check')+'اعتمد النادي</button><button class="btn btn-warn" data-a="reject">رفض</button></div></div>';
    el.querySelectorAll('[data-a]').forEach(function(b){b.onclick=function(){if(b.dataset.a==='approve'){CLUBS.push({name:p.name,members:p.members,templates:0,status:'active'});CLUB_PROPOSALS.splice(i,1);notify('اعتُمد «'+p.name+'» — نادٍ نشط الآن');}else{CLUB_PROPOSALS.splice(i,1);notify('رُفض اقتراح «'+p.name+'»');}selected=null;viewClubs(document.getElementById('view'));};});
  } else if(t==='j'){var j=CLUB_JOINS[i];el.innerHTML='<div class="dh"><div class="k">طلب انضمام · من المنصة</div><h3>'+j.user+'</h3></div><div class="db"><div class="field"><div class="lab">النادي</div><div class="val">'+j.club+'</div></div><div class="field"><div class="lab">التاريخ</div><div class="val">'+j.when+'</div></div><div class="acts"><button class="btn btn-primary" data-a="ok">'+svg('check')+'قبول العضوية</button><button class="btn btn-warn" data-a="no">رفض</button></div></div>';
    el.querySelectorAll('[data-a]').forEach(function(b){b.onclick=function(){var ok=b.dataset.a==='ok';CLUB_JOINS.splice(i,1);notify(ok?'قُبل '+j.user+' في '+j.club:'رُفض طلب '+j.user);selected=null;viewClubs(document.getElementById('view'));};});
  } else {var c=CLUBS[i];el.innerHTML='<div class="dh"><div class="k">نادٍ نشط</div><h3>'+c.name+'</h3></div><div class="db"><div class="split"><div class="s"><div class="l">الأعضاء</div><div class="v">'+c.members+'</div></div><div class="s net"><div class="l">القوالب</div><div class="v">'+c.templates+'</div></div></div><div class="acts" style="margin-top:14px"><button class="btn btn-ghost" data-a="edit">تعديل</button><button class="btn btn-human" data-a="tpl">+ قالب للنادي</button><button class="btn btn-warn" data-a="del">حذف</button></div></div>';
    el.querySelectorAll('[data-a]').forEach(function(b){b.onclick=function(){var a=b.dataset.a;if(a==='edit'){clubModal(c,i);}else if(a==='tpl'){c.templates++;renderClubs();drawClub();notify('أُضيف قالب لـ«'+c.name+'»');}else if(a==='del'){CLUBS.splice(i,1);selected=null;viewClubs(document.getElementById('view'));notify('حُذف «'+c.name+'»');}};});
  }
}
function clubModal(c){
  var edit=c||null,e=c||{};
  var s=openModal(edit?'تعديل نادٍ':'إضافة نادٍ','<div class="fld"><label>اسم النادي</label><input id="cl_n" value="'+(e.name||'')+'"></div><div class="row2"><div class="fld"><label>الأعضاء</label><input id="cl_m" type="number" value="'+(e.members||0)+'"></div><div class="fld"><label>القوالب</label><input id="cl_t" type="number" value="'+(e.templates||0)+'"></div></div><div class="acts" style="margin-top:14px"><button class="btn btn-primary" id="cl_s">'+svg('check')+(edit?'حفظ':'أضف')+'</button><button class="btn btn-ghost" id="cl_x">إلغاء</button></div>');
  s.querySelector('#cl_x').onclick=closeModal;
  s.querySelector('#cl_s').onclick=function(){var d={name:s.querySelector('#cl_n').value.trim()||'نادٍ',members:+s.querySelector('#cl_m').value||0,templates:+s.querySelector('#cl_t').value||0,status:'active'};if(edit){Object.assign(c,d);}else{CLUBS.push(d);}closeModal();clubTab='active';viewClubs(document.getElementById('view'));notify(edit?'حُدّث النادي':'أُضيف «'+d.name+'»');};
}

/* ===== MESSAGES (تواصل من الموقع) ===== */
var msgFilter='all';
const SEED_MSGS=[
  {name:'مكتب الرشيد للمحاماة',email:'office@rashid.law',phone:'٠١٠٢٢٣٣٤٤٥',topic:'شراكة / درّب معنا',body:'نرغب في تقديم دورات تدريبية عبر منصتكم، كيف نبدأ؟',at:Date.now()-3600e3*5,status:'new'},
  {name:'سارة المنصوري',email:'sara.m@mail.com',phone:'٠٥٥٦٦٧٧٨٨',topic:'الاشتراك والباقات',body:'هل باقة الأدوات تشمل المحرر القانوني للشركات الصغيرة؟',at:Date.now()-3600e3*26,status:'replied'}
];
function loadMsgs(){
  var arr=[];try{arr=JSON.parse(localStorage.getItem('elp_contact_messages')||'[]');}catch(e){}
  return arr.concat(SEED_MSGS);
}
function timeAgo(ts){var d=Math.floor((Date.now()-ts)/3600e3);if(d<1)return 'منذ أقل من ساعة';if(d<24)return 'منذ '+d+' ساعة';return 'منذ '+Math.floor(d/24)+' يوم';}
function viewMessages(v){
  if(window.EP){EP.ensure('messages',()=>viewMessages(v));}
  var Mst=(window.EP&&EP.state.messages)||'idle';
  var msgs=(window.EP&&EP.data.messages)?EP.data.messages:loadMsgs();
  var nw=msgs.filter(function(m){return m.status==='new';}).length;
  v.innerHTML=`
    <div class="policy" style="border-inline-start-color:var(--ai);background:var(--ai-bg)">${svg('inbox','ic')}<div><b>من الموقع ← غرفة العمليات:</b> كل رسالة من <span style="direction:ltr">elprofessor.net/#contact</span> تظهر هنا فورًا. مصدر واحد، لا بريد ضائع.</div></div>
    <div class="kpis">
      <div class="kpi k-2"><div class="top"><span class="ic">${svg('inbox')}</span>رسائل جديدة</div><b>${money(nw)}</b><div class="sub">بانتظار الرد</div></div>
      <div class="kpi k-1"><div class="top"><span class="ic">${svg('check')}</span>تم الرد</div><b>${money(msgs.filter(function(m){return m.status==='replied';}).length)}</b><div class="sub">مغلقة</div></div>
      <div class="kpi k-3"><div class="top"><span class="ic">${svg('users')}</span>إجمالي الرسائل</div><b>${money(msgs.length)}</b><div class="sub">من الموقع</div></div>
      <div class="kpi k-4"><div class="top"><span class="ic">${svg('mega')}</span>أكثر نوع</div><b>استفسار</b><div class="sub">عام</div></div>
    </div>
    <div class="filterbar" id="msgBar"><span class="lbl">الحالة:</span></div>
    <div class="inboxwrap"><section class="panel"><div class="ph"><h3>صندوق الرسائل</h3><span class="n" id="msgN"></span><span class="hint">اضغط رسالة للرد</span></div><div id="msgRows"></div></section><aside class="drawer" id="drawer"></aside></div>`;
  var fb=document.getElementById('msgBar');
  [['all','الكل'],['new','جديدة'],['replied','تم الرد']].forEach(function(f){fb.insertAdjacentHTML('beforeend','<div class="chip'+(msgFilter===f[0]?' on':'')+'" data-f="'+f[0]+'">'+f[1]+'</div>');});
  fb.querySelectorAll('.chip').forEach(function(c){c.onclick=function(){msgFilter=c.dataset.f;selected=null;viewMessages(v);};});
  renderMsgs(msgs);
}
function renderMsgs(msgs){
  var el=document.getElementById('msgRows');el.innerHTML='';
  var items=msgs.filter(function(m){return msgFilter==='all'||m.status===msgFilter;});
  document.getElementById('msgN').textContent=items.length;
  items.forEach(function(m,i){var realIdx=msgs.indexOf(m);el.insertAdjacentHTML('beforeend','<div class="row esc-row" data-i="'+realIdx+'" style="grid-template-columns:1.7fr 1fr 130px"><div class="c c1"><div class="src-ic" style="background:var(--ai-bg);color:var(--ai)">'+svg('inbox')+'</div><div><div class="parties">'+m.name+'</div><div class="from">'+m.topic+' · '+timeAgo(m.at)+'</div></div></div><div class="c"><div class="from" style="direction:ltr;text-align:right">'+m.email+'</div></div><div class="c"><span class="status '+(m.status==='new'?'s-wait':'s-auto')+'"><span class="d"></span>'+(m.status==='new'?'جديدة':'تم الرد')+'</span></div></div>');});
  if(!items.length)el.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">لا رسائل في هذا التصنيف.</div>';
  el.querySelectorAll('.row').forEach(function(r){r.onclick=function(){selected=+r.dataset.i;drawMsg(msgs);};});
  drawMsg(msgs);
}
function drawMsg(msgs){
  var el=document.getElementById('drawer');if(!el)return;
  if(selected===null){el.innerHTML='<div class="empty">'+svg('inbox','ic')+'<p>اختر رسالة لقراءتها والرد عليها.</p></div>';return;}
  var m=msgs[selected];if(!m){el.innerHTML='';return;}
  el.innerHTML='<div class="dh"><div class="k">رسالة تواصل · من الموقع</div><h3>'+m.name+'</h3></div><div class="db">'+
    '<div class="route"><span class="step">الموقع · فورم التواصل</span><span class="arrow">←</span><span class="step" style="color:var(--ai);font-weight:800">الرسائل</span></div>'+
    '<div class="field"><div class="lab">البريد · الهاتف</div><div class="val" style="font-size:12.5px">'+m.email+'<br>'+(m.phone||'—')+'</div></div>'+
    '<div class="field"><div class="lab">نوع الطلب</div><div class="val">'+m.topic+'</div></div>'+
    '<div class="field"><div class="lab">الرسالة</div><div class="val" style="background:var(--surface-2);border-radius:9px;padding:11px 13px;font-weight:500">'+m.body+'</div></div>'+
    '<div class="acts">'+(m.status==='new'?'<button class="btn btn-primary" data-a="reply">'+svg('check')+'تم الرد</button>':'')+'<button class="btn btn-ghost" data-a="email">رد بالبريد</button><button class="btn btn-warn" data-a="del">حذف</button></div></div>';
  el.querySelectorAll('[data-a]').forEach(function(b){b.onclick=function(){var a=b.dataset.a;
    if(a==='reply'){
      if(window.EP&&EP.data.messages&&m.id!=null){EP.replyMessage(m,function(){selected=null;viewMessages(document.getElementById('view'));});return;}
      m.status='replied';persistMsg(m);viewMessages(document.getElementById('view'));notify('تم تعليم رسالة «'+m.name+'» كمردود عليها');}
    else if(a==='email'){toast('فتح الرد بالبريد على '+m.email);}
    else if(a==='del'){
      if(window.EP&&EP.data.messages&&m.id!=null){EP.deleteMessage(m,function(){selected=null;viewMessages(document.getElementById('view'));});return;}
      deleteMsg(m);selected=null;viewMessages(document.getElementById('view'));notify('حُذفت الرسالة');}
  };});
}
function persistMsg(m){try{var k='elp_contact_messages';var arr=JSON.parse(localStorage.getItem(k)||'[]');for(var i=0;i<arr.length;i++){if(arr[i].at===m.at){arr[i].status=m.status;}}localStorage.setItem(k,JSON.stringify(arr));}catch(e){}}
function deleteMsg(m){try{var k='elp_contact_messages';var arr=JSON.parse(localStorage.getItem(k)||'[]').filter(function(x){return x.at!==m.at;});localStorage.setItem(k,JSON.stringify(arr));}catch(e){}}

    <h3>${m.label}</h3>
    <p>هذا الموديول قيد التطوير ولا يعرض بيانات بعد. سيُفعَّل بمصدر بيانات حقيقي في مرحلة لاحقة.</p>
    <span class="soon">قريبًا</span></div>`;
}

/* ===== PLACEHOLDER ===== */

  const m=MODULES[current];
  v.innerHTML=`<div class="placeholder"><div class="pic" style="background:${m.bg};color:${m.c}">${svg(m.ic).replace('width="20" height="20"','width="28" height="28"')}</div>

    <span class="soon">التالي في خطة إعادة التصميم</span></div>`;
}

function toast(t){const el=document.getElementById('toasts');const d=document.createElement('div');d.className='toast';d.innerHTML=svg('check','ic')+'<span>'+t+'</span>';el.appendChild(d);setTimeout(()=>d.remove(),2600);}

const ROLE_MSG={
  employee:'⚠ وضع موظف المتابعة — <span class="ro-extra">قراءة فقط: المستخدمون والدورات، بلا أرقام مالية ولا إجراءات اعتماد.</span>',
  trainer:'🎓 لوحة المدرّب — <span class="ro-extra">دوراتك وأرباحك الشخصية فقط، كما تظهر للمدرّب داخل المنصة.</span>',
  investor:'💼 لوحة المستثمر — <span class="ro-extra">محفظتك واستثماراتك الشخصية (mirror من الداش بورد).</span>',
  viewer:'⏳ حساب بانتظار التفعيل — <span class="ro-extra">يحدّد الأدمن دورك لتظهر لوحتك المناسبة.</span>'
};
// applyRole: محرّك الصلاحيات — يحدّد أي لوحة/موديولات تظهر حسب الدور الحقيقي
// للحساب القادم من /auth/me (admin/employee/trainer/investor/viewer). ليس مبدّلًا
// يدويًا: لا يوجد زر تبديل في الواجهة؛ يُستدعى مرّة واحدة عند الإقلاع بدور الحساب.
function setRole(r){
  role=r;
  document.querySelector('.app').classList.toggle('ro',r==='employee'||r==='viewer');
  const banner=document.getElementById('roBanner');
  if(r==='admin'){banner.style.display='none';}
  else{banner.style.display='flex';banner.innerHTML=ROLE_MSG[r];}
  if(!(r==='admin'||ROLE_NAV[r].includes(current))){current=ROLE_NAV[r][0];selected=null;}
  document.getElementById('pageTitle').textContent=MODULES[current].label;
  renderNav();renderView();
}
// لا يوجد مبدّل أدوار مرئي: الدور يُشتق من الحساب (setRole يُستدعى من EP_BOOT فقط).
// Expose the boot so the auth layer can run it only after a valid login.
// الدور الحقيقي للمستخدم (من /auth/me) يحكم أي لوحة تظهر: أدمن = كل شيء؛
// موظف = قراءة فقط (مستخدمون/دورات)؛ مدرّب/مستثمر = لوحته الشخصية؛ غير ذلك = بانتظار التفعيل.
window.EP_BOOT=function(){
  var r=(window.EP&&EP.role)?EP.role:null;
  if(r){
    if(!ROLE_NAV[r]&&r!=='admin')r='viewer'; // أي دور غير معروف يهبط على شاشة الانتظار
    setRole(r); // setRole يتكفّل بالـ nav + البانر + قراءة-فقط + شاشة الهبوط ثم يعيد الرسم
    renderNotifPanel();
    return;
  }
  renderNav();renderView();renderNotifPanel();
};
if(!window.EP||!window.EP.requireAuth){ // no auth layer present → boot directly (safe fallback)
  window.EP_BOOT();
}
(function(){var bb=document.getElementById('bellBtn'),np=document.getElementById('notifPanel');if(bb&&np){bb.onclick=function(e){e.stopPropagation();np.style.display=np.style.display==='none'?'block':'none';};document.addEventListener('click',function(e){if(np.style.display==='block'&&!np.contains(e.target)&&e.target!==bb&&!bb.contains(e.target))np.style.display='none';});}})();
document.getElementById('q').addEventListener('input',()=>{if(current==='inbox')renderInbox();});
(function(){var mb=document.getElementById('menuBtn'),rl=document.querySelector('.rail'),sc=document.getElementById('railscrim');if(mb&&rl&&sc){mb.onclick=function(){rl.classList.toggle('open');sc.classList.toggle('on');};sc.onclick=function(){rl.classList.remove('open');sc.classList.remove('on');};rl.addEventListener('click',function(e){if(e.target.closest('.nav .item')){rl.classList.remove('open');sc.classList.remove('on');}});}})();
</script>
